steps:
  - name: gcr.io/k8s-skaffold/pack
    args:
      - build
      - ${_IMAGE}
      - --builder=gcr.io/buildpacks/builder:google-22
      - --path=backend
      - --publish

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - redmatrixsolutions-web
      - --image=${_IMAGE}
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated

substitutions:
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/redmatrixsolutions-web:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
