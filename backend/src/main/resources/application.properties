spring.application.name=backend

# Server
server.port=${PORT:8080}

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true

# Administration
redmatrix.admin.username=${REDMATRIX_ADMIN_USER:admin}
redmatrix.admin.password=${REDMATRIX_ADMIN_PASSWORD:RedMatrix2026*}
redmatrix.admin.display-name=${REDMATRIX_ADMIN_NAME:Administrador RedMatrix}

# Local persistent database
spring.datasource.url=jdbc:h2:file:./data/redmatrix_admin;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

