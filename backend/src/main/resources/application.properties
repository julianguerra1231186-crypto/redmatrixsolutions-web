spring.application.name=backend

# ── Servidor ──
server.port=${PORT:9090}

# ── Recursos estáticos ──
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# Administracion
redmatrix.admin.username=${REDMATRIX_ADMIN_USER:admin}
redmatrix.admin.password=${REDMATRIX_ADMIN_PASSWORD:RedMatrix2026*}
redmatrix.admin.display-name=${REDMATRIX_ADMIN_NAME:Administrador RedMatrix}

# Base de datos local persistente
spring.datasource.url=jdbc:h2:file:./data/redmatrix_admin;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

